<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aktiv, jeździecka mapa Polski</title>
  <meta name="description" content="Aktiv. Cała jeździecka Polska na jednej mapie. Stajnie, weterynarze, fizjoterapeuci, dietetycy i sklepy z paszą.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 28 38'><path d='M14 0 C6 0 0 6 0 14 C0 24 14 38 14 38 C14 38 28 24 28 14 C28 6 22 0 14 0 Z' fill='%2322C55E'/><path d='M14 22 L14 9' stroke='%23FFFFFF' stroke-width='3' stroke-linecap='round'/><path d='M10 13 L14 9 L18 13' fill='none' stroke='%23FFFFFF' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'/></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="index.html" aria-label="Aktiv, strona główna">
      <svg class="brand-mark" width="36" height="33" viewBox="0 0 44 40" aria-hidden="true">
        <path d="M15 36 C9 27 4 22 4 15 A11 11 0 1 1 26 15 C26 22 21 27 15 36 Z" fill="#22C55E"></path>
        <circle cx="15" cy="14" r="4.5" fill="#FFFFFF"></circle>
        <path d="M26 21 L37 10" fill="none" stroke="#22C55E" stroke-width="6" stroke-linecap="round"></path>
        <path d="M31 10 L37 10 L37 16" fill="none" stroke="#22C55E" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"></path>
      </svg>
      <span class="brand-name"><b>Aktiv</b><span>portal</span></span>
    </a>
    <div class="topbar-actions">
      <span class="demo-pill">wersja demo</span>
      <a class="btn btn-ghost" href="#">Dla firm</a>
      <a class="btn btn-solid" href="#">Zaloguj</a>
    </div>
  </header>

  <main class="layout">
    <aside id="panel" class="panel" aria-label="Wyszukiwarka i wyniki">
      <div class="panel-head">
        <p class="eyebrow">Jeździecka mapa Polski</p>
        <h1 class="lead">Znajdź wszystko, czego potrzebuje <span class="hl">Twój koń.</span></h1>
        <div class="search">
          <div class="search-field">
            <svg class="ico" width="18" height="18" viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7" fill="none" stroke="currentColor" stroke-width="2"></circle><path d="M21 21 L16.5 16.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path></svg>
            <input id="q" class="search-input" type="text" placeholder="Stajnia, weterynarz, pasza..." aria-label="Czego szukasz">
          </div>
          <div class="search-field">
            <svg class="ico" width="18" height="18" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 22 C12 22 19 14.5 19 9 A7 7 0 1 0 5 9 C5 14.5 12 22 12 22 Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"></path><circle cx="12" cy="9" r="2.5" fill="none" stroke="currentColor" stroke-width="2"></circle></svg>
            <input id="place" class="search-input" type="text" placeholder="Miejscowość" aria-label="Gdzie">
          </div>
        </div>
        <div id="chips" class="chips" role="tablist" aria-label="Kategorie"></div>
        <p id="count" class="result-count"></p>
      </div>
      <div id="results" class="results" aria-live="polite"></div>

      <section id="detail" class="detail" aria-hidden="true">
        <button id="detail-back" class="detail-back" type="button">
          <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true"><path d="M15 5 L8 12 L15 19" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
          Wróć do listy
        </button>
        <div id="detail-content"></div>
      </section>
    </aside>

    <div class="map-wrap">
      <div id="map"></div>
    </div>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="script.js"></script>
</body>
</html>
